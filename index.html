<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Image Generator (Imagen 3)</title>
    <!-- Tailwind CSS を使ってモダンなデザインを適用 -->
    <script src="https://jsdelivr.net"></script>
    <style>
        /* スピナーアニメーション */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">

    <!-- ヘッダーエリア -->
    <header class="bg-gray-800 p-4 shadow-md flex justify-between items-center relative">
        <h1 class="text-xl font-bold tracking-wide">🎨 Gemini AI 画像生成</h1>
        
        <!-- 設定用コンポーネント -->
        <div>
            <button id="settingsBtn" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm transition flex items-center gap-1 cursor-pointer">
                ⚙️ 設定
            </button>
            <!-- 設定モーダル（初期状態は非表示） -->
            <div id="settingsModal" class="hidden absolute right-4 top-16 bg-gray-800 border border-gray-700 p-4 rounded-xl shadow-2xl z-50 w-80">
                <h3 class="text-sm font-semibold mb-2 text-gray-300">Gemini API キー設定</h3>
                <input type="password" id="apiKeyInput" placeholder="AIZA... から始まるキーを入力" class="w-full p-2 rounded bg-gray-900 border border-gray-700 text-white text-sm focus:outline-none focus:border-blue-500 mb-3">
                <div class="flex justify-end gap-2">
                    <button id="saveKeyBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded text-xs cursor-pointer">保存</button>
                </div>
                <p class="text-[11px] text-gray-400 mt-2">※ キーはブラウザのLocalStorageにのみ安全に保存されます。</p>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-6 flex flex-col justify-center items-center">
        
        <!-- プロンプト入力エリア -->
        <div class="w-full bg-gray-800 p-6 rounded-2xl shadow-xl mb-6">
            <label for="promptInput" class="block text-sm font-medium text-gray-300 mb-2">生成したい画像のイメージ（英語が推奨されます）</label>
            <textarea id="promptInput" rows="3" placeholder="例: A futuristic city at sunset, cyberpunk style, hyper-detailed, 8k resolution" class="w-full p-3 rounded-xl bg-gray-900 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 resize-none mb-4"></textarea>
            
            <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-6 rounded-xl transition shadow-lg shadow-blue-900/30 flex justify-center items-center gap-2 cursor-pointer">
                🚀 画像を生成する
            </button>
        </div>

        <!-- 状態表示 & 画像出力エリア -->
        <div class="w-full flex flex-col items-center justify-center min-h-[300px] border-2 border-dashed border-gray-700 rounded-2xl p-4 bg-gray-800/50">
            <!-- ローディングスピン -->
            <div id="loadingArea" class="hidden flex flex-col items-center gap-3">
                <div class="loader"></div>
                <p class="text-sm text-gray-400">AIが画像を生成中（約10〜20秒かかります）...</p>
            </div>

            <!-- 初期表示テキスト -->
            <div id="placeholderText" class="text-gray-500 text-center">
                <p class="text-lg">ここに生成された画像が表示されます</p>
                <p class="text-xs mt-1">※ 右上の設定からあらかじめAPIキーを入力してください</p>
            </div>

            <!-- 出力画像 -->
            <div id="imageResultContainer" class="hidden w-full flex flex-col items-center">
                <img id="resultImage" class="max-w-full max-h-[500px] rounded-xl shadow-2xl border border-gray-700 object-contain mb-4" src="" alt="Generated Image">
                <a id="downloadBtn" href="#" download="gemini-image.png" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-1">
                    📥 画像を保存する
                </a>
            </div>
        </div>
    </main>

    <!-- JavaScript ロジック -->
    <script>
        // DOM要素の取得
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const loadingArea = document.getElementById('loadingArea');
        const placeholderText = document.getElementById('placeholderText');
        const imageResultContainer = document.getElementById('imageResultContainer');
        const resultImage = document.getElementById('resultImage');
        const downloadBtn = document.getElementById('downloadBtn');

        // 1. ローカルストレージからAPIキーを読み込む
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('GEMINI_API_KEY');
            if (savedKey) {
                apiKeyInput.value = savedKey;
            }
        });

        // 2. 設定モーダルの開閉
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsModal.classList.toggle('hidden');
        });

        // モーダル外をクリックしたら閉じる
        document.addEventListener('click', (e) => {
            if (!settingsModal.contains(e.target) && e.target !== settingsBtn) {
                settingsModal.classList.add('hidden');
            }
        });

        // 3. APIキーをローカルストレージに保存
        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('GEMINI_API_KEY', key);
                alert('APIキーを保存しました！');
                settingsModal.classList.add('hidden');
            } else {
                localStorage.removeItem('GEMINI_API_KEY');
                alert('キーが空欄のため削除されました。');
            }
        });

        // 4. 画像生成処理
        generateBtn.addEventListener('click', async () => {
            const apiKey = localStorage.getItem('GEMINI_API_KEY');
            const prompt = promptInput.value.trim();

            if (!apiKey) {
                alert('右上の設定ボタンからGemini APIキーを設定してください。');
                settingsModal.classList.remove('hidden');
                return;
            }

            if (!prompt) {
                alert('生成したいイメージ（プロンプト）を入力してください。');
                return;
            }

            // 表示状態のリセットとローディング開始
            placeholderText.classList.add('hidden');
            imageResultContainer.classList.add('hidden');
            loadingArea.classList.remove('hidden');
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50', 'cursor-not-allowed');

            // 使用する高精度モデル (Imagen 3)
            const MODEL_NAME = 'imagen-3.0-generate-002';
            // Gemini API の画像生成エンドポイントURL
            const url = `https://googleapis.com{MODEL_NAME}:generateImages?key=${apiKey}`;

            // リクエストボディの作成
            const requestBody = {
                prompt: prompt,
                numberOfImages: 1,
                outputMimeType: "image/png",
                aspectRatio: "1:1" // 必要に応じて "3:4", "4:3", "16:9" 等に変更可能
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `HTTPエラー: ${response.status}`);
                }

                const data = await response.json();
                
                // APIからのレスポンスからBase64画像データを取得
                if (data.generatedImages && data.generatedImages[0]?.image?.imageBytes) {
                    const base64Data = data.generatedImages[0].image.imageBytes;
                    const imageSrc = `data:image/png;base64,${base64Data}`;
                    
                    // 画面に描写
                    resultImage.src = imageSrc;
                    downloadBtn.href = imageSrc;
                    
                    // コンテナの切り替え
                    loadingArea.classList.add('hidden');
                    imageResultContainer.classList.remove('hidden');
                } else {
                    throw new Error('画像データがレスポンスに含まれていません。別のプロンプトを試してください。');
                }

            } catch (error) {
                console.error(error);
                alert(`エラーが発生しました:\n${error.message}`);
                // エラー時は初期状態に戻す
                loadingArea.classList.add('hidden');
                placeholderText.classList.remove('hidden');
            } finally {
                // ボタンの有効化
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
